<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amora - Catálogo Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --vinho: #611624; --vinho-light: #fdf2f4; --vinho-hover: #4a101b; }
        body { font-family: 'Inter', sans-serif; background-color: #fdfbfc; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes heartBeat { 0%, 100% { transform: rotate(12deg) scale(1); } 50% { transform: rotate(12deg) scale(1.3); } }
        .logo-heart { 
            display: inline-block; width: 14px; height: 14px; background-color: currentColor; 
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'); 
            margin-left: 2px; transform: rotate(12deg); animation: heartBeat 2s infinite; 
        }

        .glass-card { background: white; border: 1px solid rgba(97, 22, 36, 0.05); border-radius: 28px; transition: all 0.3s ease; }
        .product-card:active { transform: scale(0.98); }
        
        .out-of-stock { filter: grayscale(0.8); opacity: 0.6; pointer-events: none; }
        .badge-esgotado {
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(4px); color: white; padding: 4px 12px; 
            border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; z-index: 10;
        }

        #cart-drawer { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        .cart-open #cart-drawer { transform: translateY(0); }
        
        .shimmer {
            background: linear-gradient(90deg, #f6f7f8 25%, #edeef1 50%, #f6f7f8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur-lg border-b border-gray-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-3xl font-serif text-[#611624] italic">amora<span class="logo-heart"></span></h1>
        <button onclick="toggleCart()" class="relative p-2 text-[#611624]">
            <i data-lucide="shopping-bag" class="w-7 h-7"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </nav>

    <header class="px-6 py-8">
        <h2 class="text-4xl font-serif italic text-gray-800 leading-tight">Escolhas da <br><span class="text-[#611624]">Estação</span></h2>
        <div class="mt-6 relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="searchInput" oninput="renderCatalog()" placeholder="O que procuras?" 
                   class="w-full pl-12 pr-6 py-4 bg-white border border-gray-100 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-[#611624]/10">
        </div>
    </header>

    <main id="catalog-grid" class="px-6 grid grid-cols-2 gap-4">
        <div class="glass-card h-64 shimmer"></div>
        <div class="glass-card h-64 shimmer"></div>
    </main>

    <div id="cart-overlay" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm hidden" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="fixed bottom-0 left-0 right-0 z-[110] bg-white rounded-t-[40px] shadow-2xl translate-y-full max-h-[85vh] flex flex-col">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-2"></div>
        <div class="px-8 py-6 flex justify-between items-center">
            <h3 class="text-2xl font-serif italic text-[#611624]">Tua Sacola</h3>
            <button onclick="toggleCart()" class="text-gray-400 p-2"><i data-lucide="x"></i></button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto px-8 py-2 space-y-6"></div>

        <div class="p-8 border-t border-gray-50 space-y-4">
            <div class="flex justify-between items-center text-lg font-serif">
                <span class="text-gray-400 italic">Total Estimado</span>
                <span id="cart-total" class="text-[#611624] font-bold">R$ 0,00</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-[#611624] text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i data-lucide="send" class="w-5 h-5"></i> Encomendar no WhatsApp
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[120] opacity-0 transition-all translate-y-10">
        <div class="bg-[#611624] text-white px-8 py-3 rounded-full shadow-2xl font-medium text-sm">Adicionado à sacola!</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVXjw7pHV-37ttvxSwR4NF284dm5ARtIN-tojACIRHZqqOYLvMxN6fpSUMyVxuYoK8/exec";
        let products = [];
        let cart = [];

        const parseVal = (v) => {
            if (!v) return 0;
            if (typeof v === 'number') return v;
            let c = String(v).replace(/R\$/g, '').replace(/\s/g, '');
            if (c.includes(',') && c.includes('.')) c = c.replace(/\./g, '').replace(',', '.');
            else c = c.replace(',', '.');
            return parseFloat(c) || 0;
        };

        const formatPrice = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseVal(v));

        async function loadProducts() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=read");
                const data = await res.json();
                products = data.products || [];
                renderCatalog();
            } catch (e) {
                console.error("Erro ao carregar:", e);
                document.getElementById('catalog-grid').innerHTML = '<p class="col-span-2 text-center py-10 text-gray-400 italic">Erro ao carregar produtos.</p>';
            }
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = products.filter(p => p.name && p.name.toLowerCase().includes(search));

            if(filtered.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center py-20 text-gray-300 italic">Nenhum item encontrado.</p>';
                return;
            }

            grid.innerHTML = filtered.map((p, idx) => {
                const stock = parseVal(p.stock);
                const esgotado = stock <= 0;
                
                // Puxa a imagem cadastrada (p.img) ou usa o placeholder caso não tenha foto
                const imgSrc = (p.img && p.img.trim() !== "") ? p.img : "https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=400&auto=format&fit=crop";

                return `
                    <div class="glass-card product-card flex flex-col relative ${esgotado ? 'out-of-stock' : ''}">
                        ${esgotado ? '<div class="badge-esgotado">Esgotado</div>' : ''}
                        <div class="aspect-[4/5] overflow-hidden rounded-t-[28px] bg-gray-50">
                            <img src="${imgSrc}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <div>
                                <h4 class="text-[11px] font-bold text-gray-700 leading-tight mb-1 line-clamp-2 min-h-[32px] uppercase tracking-tighter">${p.name}</h4>
                                <p class="text-lg font-serif italic text-[#611624] font-bold">${formatPrice(p.price)}</p>
                            </div>
                            ${!esgotado ? `
                                <button onclick="addToCart('${p.name}')" class="mt-3 w-full bg-[#611624]/5 text-[#611624] py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest active:bg-[#611624] active:text-white transition-all">
                                    Adicionar
                                </button>
                            ` : `
                                <div class="mt-3 w-full text-center py-2.5 text-gray-300 text-[10px] font-bold uppercase border border-dashed border-gray-100 rounded-xl">
                                    Indisponível
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function addToCart(name) {
            const product = products.find(p => p.name === name);
            const inCart = cart.find(i => i.name === name);
            const maxStock = parseVal(product.stock);
            
            if (inCart) {
                if(inCart.qty < maxStock) inCart.qty++;
                else return alert("Limite de stock atingido para este item!");
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCart();
            showToast();
        }

        function updateCart() {
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            const total = cart.reduce((acc, i) => acc + (parseVal(i.price) * i.qty), 0);
            
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);

            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-300 italic">Tua sacola está vazia...</div>`;
            } else {
                container.innerHTML = cart.map((item, idx) => {
                    const imgSrc = (item.img && item.img.trim() !== "") ? item.img : "https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=400&auto=format&fit=crop";
                    return `
                        <div class="flex gap-4 items-center">
                            <img src="${imgSrc}" class="w-14 h-14 rounded-xl object-cover border border-gray-100">
                            <div class="flex-1">
                                <h5 class="text-sm font-bold text-gray-800">${item.name}</h5>
                                <p class="text-sm text-[#611624] font-serif italic">${formatPrice(item.price)}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="changeQty(${idx}, -1)" class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-gray-400">-</button>
                                <span class="text-sm font-bold w-4 text-center">${item.qty}</span>
                                <button onclick="changeQty(${idx}, 1)" class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center text-gray-400">+</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('cart-total').innerText = formatPrice(total);
        }

        function changeQty(idx, delta) {
            const item = cart[idx];
            const product = products.find(p => p.name === item.name);
            const maxStock = parseVal(product.stock);
            
            if (delta > 0 && item.qty >= maxStock) return;
            
            item.qty += delta;
            if (item.qty <= 0) cart.splice(idx, 1);
            updateCart();
        }

        function toggleCart() {
            const overlay = document.getElementById('cart-overlay');
            const drawer = document.getElementById('cart-drawer');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => drawer.classList.remove('translate-y-full'), 10);
            } else {
                drawer.classList.add('translate-y-full');
                setTimeout(() => overlay.classList.add('hidden'), 400);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        function sendOrder() {
            if (cart.length === 0) return;
            let message = "*Novo Pedido - Amora Boutique*\n\n";
            cart.forEach(item => {
                message += `• ${item.qty}x ${item.name} (${formatPrice(item.price * item.qty)})\n`;
            });
            const total = document.getElementById('cart-total').innerText;
            message += `\n*Total Estimado: ${total}*\n\n_Olá! Gostaria de confirmar a disponibilidade destas peças._`;
            
            const phone = "5585999999999"; 
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = () => {
            loadProducts();
            lucide.createIcons();
        };
    </script>
</body>
</html>
